name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        qt-version: ['6']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt ${{ matrix.qt-version }}
        uses: jurplel/install-qt-action@v4
        with:
          version: '${{ matrix.qt-version }}.5'
          modules: 'qtscintilla'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: |
          ctest --test-dir build --output-on-failure
          # Note: test_buffer and test_util may hang due to Qt static-dtor ordering — test harness issue
